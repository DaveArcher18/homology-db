<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Homology Atlas</title>
  <meta name="description" content="A browsable development snapshot of spaces and their ordinary homology">
  <script>
    (() => {
      const key = "homology-atlas-theme-v1";
      try {
        const preference = localStorage.getItem(key);
        if (preference === "light" || preference === "dark") {
          document.documentElement.dataset.theme = preference;
        }
      } catch (_error) {
        // Storage is optional, especially when the self-contained file is opened directly.
      }
    })();
  </script>
  <style>/*__ATLAS_CSS__*/</style>
</head>
<body>
  <a class="skip-link" href="#atlas-document">Skip to main content</a>

  <header class="site-header">
    <div class="header-inner">
      <a id="site-brand" class="site-brand" href="#home" aria-label="Homology Atlas home">
        <span class="brand-mark" aria-hidden="true">H<sub>∗</sub></span>
        <span class="brand-copy">
          <strong>Homology Atlas</strong>
          <small>Spaces and their invariants</small>
        </span>
      </a>

      <nav class="header-actions" aria-label="Atlas utilities">
        <button id="family-toggle" class="utility-button browse-button mobile-only" type="button"
          aria-expanded="false" aria-controls="atlas-index">
          <span class="menu-mark" aria-hidden="true"></span>
          Browse
        </button>
        <a id="request-space" class="utility-link request-link"
          href="https://github.com/DaveArcher18/homology-db/issues/new?template=space-request.yml"
          target="_blank" rel="noopener noreferrer">Request a space <span aria-hidden="true">↗</span></a>
        <button id="about-toggle" class="utility-button" type="button"
          aria-expanded="false" aria-controls="snapshot-about">About</button>
        <details id="theme-menu" class="theme-menu">
          <summary aria-label="Theme: System">
            <span class="theme-symbol" aria-hidden="true"></span>
            <span class="theme-label">Theme</span>
            <span class="theme-current">System</span>
          </summary>
          <fieldset class="theme-options">
            <legend>Appearance</legend>
            <label>
              <input type="radio" name="theme-preference" value="system" checked>
              <span><strong>System</strong><small>Match this device</small></span>
            </label>
            <label>
              <input type="radio" name="theme-preference" value="light">
              <span><strong>Light</strong><small>Paper and ink</small></span>
            </label>
            <label>
              <input type="radio" name="theme-preference" value="dark">
              <span><strong>Dark</strong><small>Low-light reading</small></span>
            </label>
          </fieldset>
        </details>
      </nav>
    </div>
  </header>

  <div class="page-shell">
    <aside id="atlas-index" class="atlas-index" aria-labelledby="atlas-index-title">
      <div class="index-inner">
        <div class="index-heading">
          <div class="index-title-row">
            <div>
              <p class="index-eyebrow">Explore the atlas</p>
              <h2 id="atlas-index-title">Spaces</h2>
            </div>
            <button id="index-close" class="index-close mobile-only" type="button"
              aria-label="Close atlas navigation">Close</button>
          </div>
        </div>

        <nav class="primary-nav" aria-label="Atlas">
          <a id="nav-home" class="primary-nav-link" href="#home">
            <span aria-hidden="true">⌂</span>
            Home
          </a>
          <a id="nav-spaces" class="primary-nav-link" href="#spaces">
            <span aria-hidden="true">𝒳</span>
            All spaces
          </a>
          <a id="request-space-index" class="primary-nav-link index-request mobile-only"
            href="https://github.com/DaveArcher18/homology-db/issues/new?template=space-request.yml"
            target="_blank" rel="noopener noreferrer">
            <span aria-hidden="true">＋</span>
            Request a space
          </a>
        </nav>

        <details id="snapshot-about" class="snapshot-about">
          <summary>About this snapshot</summary>
          <div id="snapshot-detail"></div>
        </details>
      </div>
    </aside>

    <div id="index-backdrop" class="index-backdrop" aria-hidden="true" hidden></div>

    <main id="atlas-document" class="atlas-document" tabindex="-1">
      <noscript>This atlas requires JavaScript to render its embedded, offline snapshot.</noscript>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>Unknown, missing, and not-computed states are never treated as zero.</p>
      <nav aria-label="Footer">
        <a href="#spaces">Browse spaces</a>
      </nav>
    </div>
  </footer>

  <p id="action-status" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></p>
  <script>/*__ATLAS_PRESENTATION_JS__*/</script>
  <script id="atlas-data" type="application/json">__ATLAS_JSON__</script>
  <script>/*__ATLAS_JS__*/</script>
</body>
</html>
